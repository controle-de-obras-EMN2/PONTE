<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONTE | Fluxo</title>

    <link rel="stylesheet" href="ponte.css">

    <style>
        #pagina-fluxo {
            margin-top: 110px;
            padding: 18px 22px 22px 22px;
            background: #f4f6f8;
            min-height: calc(100vh - 110px);
            box-sizing: border-box;
        }

        .fluxo-topo {
            margin-bottom: 14px;
        }

        .fluxo-topo h1 {
            color: #0b2f5b;
            margin: 0;
            font-size: 30px;
            font-weight: 800;
        }

        .pdf-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 180px);
            min-height: 620px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 3px 12px rgba(0,0,0,.08);
            overflow: hidden;
            border: 1px solid #e2e8f0;
            cursor: grab;
            touch-action: none;
            overscroll-behavior: contain;
        }

        .pdf-container.arrastando {
            cursor: grabbing;
        }

        #pdfCanvas {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        .zoom-indicador {
            position: absolute;
            right: 18px;
            bottom: 18px;
            z-index: 20;
            background: rgba(11, 47, 91, .92);
            color: white;
            padding: 7px 11px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            pointer-events: none;
            opacity: .95;
        }

        .carregando-pdf {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0b2f5b;
            font-size: 18px;
            font-weight: 700;
            pointer-events: none;
        }

        .erro-pdf {
            padding: 24px;
            color: #0b2f5b;
            font-weight: 700;
        }

        @media (max-width: 800px) {
            #pagina-fluxo {
                margin-top: 0;
                padding: 14px;
            }

            .fluxo-topo h1 {
                font-size: 24px;
            }

            .pdf-container {
                height: 70vh;
                min-height: 460px;
            }
        }
    </style>
</head>

<body>

    <header id="header">

        <img src="images/logo_ponte.png" id="logo" alt="Logo PONTE">

        <div id="titulo">
            Plataforma de Operação e Navegação Técnica de Engenharia
        </div>

        <div id="menu">

            <a href="index.html" class="menu-btn">
                🗺️ Mapa
            </a>

            <a href="dashboard.html" class="menu-btn">
                📊 Dashboard
            </a>

            <a href="fluxo.html" class="menu-btn">
                🧭 Fluxo
            </a>

        </div>

    </header>

    <main id="pagina-fluxo">

        <section class="fluxo-topo">
            <h1>Fluxo dos Pacotes</h1>
        </section>

        <section class="pdf-container" id="pdfContainer">

            <canvas id="pdfCanvas"></canvas>

            <div class="carregando-pdf" id="carregandoPdf">
                Carregando fluxograma...
            </div>

            <div class="zoom-indicador" id="zoomIndicador">
                100%
            </div>

        </section>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="fluxo.js"></script>

</body>

</html>
