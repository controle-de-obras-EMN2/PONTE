<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONTE | Fluxo</title>

    <link rel="stylesheet" href="ponte.css">

    <style>
        #pagina-fluxo {
            margin-top: 110px;
            padding: 18px 22px 22px 22px;
            background: #f4f6f8;
            min-height: calc(100vh - 110px);
            box-sizing: border-box;
        }

        .fluxo-topo {
            margin-bottom: 14px;
        }

        .fluxo-topo h1 {
            color: #0b2f5b;
            margin: 0;
            font-size: 30px;
            font-weight: 800;
        }

        .fluxo-area {
            position: relative;
            height: calc(100vh - 180px);
            min-height: 560px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 3px 12px rgba(0,0,0,.08);
            overflow: auto;
            border: 1px solid #e2e8f0;
            cursor: grab;
        }

        .fluxo-area.arrastando {
            cursor: grabbing;
        }

        .fluxo-canvas {
            position: relative;
            display: block;
            transform-origin: top left;
        }

        #imagemFluxo {
            display: block;
            width: 100%;
            height: 100%;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        .hotspot {
            position: absolute;
            border: 2px solid rgba(11, 47, 91, .18);
            background: rgba(11, 47, 91, .04);
            border-radius: 8px;
            cursor: pointer;
            box-sizing: border-box;
            transition: .15s;
            pointer-events: auto;
        }

        .hotspot:hover {
            border-color: #0b2f5b;
            background: rgba(11, 47, 91, .16);
            box-shadow: 0 0 0 4px rgba(11, 47, 91, .12);
        }

        .tooltip-fluxo {
            position: fixed;
            z-index: 999999;
            background: #0b2f5b;
            color: white;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            max-width: 320px;
            pointer-events: none;
            display: none;
            box-shadow: 0 6px 18px rgba(0,0,0,.25);
        }

        .tooltip-fluxo strong {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .zoom-indicador {
            position: absolute;
            right: 18px;
            bottom: 18px;
            z-index: 20;
            background: rgba(11, 47, 91, .92);
            color: white;
            padding: 7px 11px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            pointer-events: none;
            opacity: .9;
        }

        .modal-fluxo-info {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }

        .modal-fluxo-info div {
            background: #f8fafc;
            border-left: 5px solid #0b2f5b;
            border-radius: 10px;
            padding: 12px;
        }

        .modal-fluxo-info span {
            display: block;
            color: #64748b;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .modal-fluxo-info strong {
            display: block;
            color: #111;
            font-size: 18px;
        }

        @media (max-width: 800px) {
            #pagina-fluxo {
                margin-top: 0;
                padding: 14px;
            }

            .fluxo-topo h1 {
                font-size: 24px;
            }

            .fluxo-area {
                height: 68vh;
                min-height: 420px;
            }

            .modal-fluxo-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header id="header">

        <img src="images/logo_ponte.png" id="logo" alt="Logo PONTE">

        <div id="titulo">
            Plataforma de Operação e Navegação Técnica de Engenharia
        </div>

        <div id="menu">

            <a href="index.html" class="menu-btn">
                🗺️ Mapa
            </a>

            <a href="dashboard.html" class="menu-btn">
                📊 Dashboard
            </a>

            <a href="fluxo.html" class="menu-btn">
                🧭 Fluxo
            </a>

        </div>

    </header>

    <main id="pagina-fluxo">

        <section class="fluxo-topo">
            <h1>Fluxo dos Pacotes</h1>
        </section>

        <section class="fluxo-area" id="fluxoArea">
            <div class="fluxo-canvas" id="fluxoCanvas">
                <img src="images/fluxograma_pacotes.png" id="imagemFluxo" alt="Fluxograma dos Pacotes">
            </div>

            <div class="zoom-indicador" id="zoomIndicador">
                100%
            </div>
        </section>

    </main>

    <div id="modal" class="modal" style="display:none;">
        <div class="modal-content">

            <div class="modal-header">
                <h2 id="modalTitulo"></h2>
                <button class="modal-close" type="button" onclick="fecharModal()">×</button>
            </div>

            <div id="modalCorpo"></div>

        </div>
    </div>

    <div id="tooltipFluxo" class="tooltip-fluxo"></div>

    <script src="fluxo.js"></script>

</body>

</html>
