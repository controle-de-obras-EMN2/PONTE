<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>PONTE | Dashboard</title>

<link rel="stylesheet" href="ponte.css">

</head>

<body>

<header id="header">

    <img src="images/logo_ponte.png" id="logo">

    <div id="titulo">
        Plataforma de Operação e Navegação Técnica de Engenharia
    </div>

    <div id="menu">

        <a href="index.html" class="menu-btn">
            🗺️ Mapa
        </a>

        <a href="dashboard.html" class="menu-btn">
            📊 Dashboard
        </a>

    </div>

</header>

<div style="
height: calc(100vh - 110px);
margin-top:110px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
">

  <main id="dashboard">

    <section class="cards">

        <div class="card">
            <h3>Economias Fator U</h3>
            <strong id="ecoFatorUReal">0</strong>
            <span id="ecoFatorUPerc">0%</span>
            <p id="ecoFatorUMeta">Meta: 0</p>
        </div>

        <div class="card">
            <h3>Economias Contrato</h3>
            <strong id="ecoContratoReal">0</strong>
            <span id="ecoContratoPerc">0%</span>
            <p id="ecoContratoMeta">Meta: 0</p>
        </div>

        <div class="card">
            <h3>Imobilizado</h3>
            <strong id="imobReal">R$ 0</strong>
            <span id="imobPerc">0%</span>
            <p id="imobMeta">Meta: R$ 0</p>
        </div>

        <div class="card">
            <h3>Produção Integra</h3>
            <strong id="prodIntegraReal">0 m</strong>
            <span id="prodIntegraPerc">0%</span>
            <p id="prodIntegraMeta">Meta: 0 m</p>
        </div>

    </section>

    <section class="graficos">

        <div class="grafico-card">
            <h2>Valor Contratual x Pedido x Unitizado</h2>
            <canvas id="graficoValores"></canvas>
        </div>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="dados/metas.js"></script>
<script src="dashboard.js"></script>

</div>

<div id="logo-footer">

    <img src="images/logo_empresa.png">

</div>

</body>
</html>
